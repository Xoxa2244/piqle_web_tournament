name: CI

on:
  push:
    branches: [Sol2, deviq]
  pull_request:
    branches: [Sol2, deviq]

jobs:
  check:
    name: TypeScript + Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx vitest run
